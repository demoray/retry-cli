name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  merge_group:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: rustup update
      shell: bash
    - uses: Swatinem/rust-cache@c676846f29d98ff6b0106d3608c7ffd4048af17b
    - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0
      with:
        crate: typos-cli
    - run: eng/build.sh
      shell: bash